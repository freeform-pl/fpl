defaults:
  - task: square_lowdim
  - _self_

name: train_reward_conditioned_flow_transformer_lowdim
_target_: diffusion_policy.workspace.train_reward_conditioned_flow_transformer_lowdim_workspace.TrainRewardConditionedFlowTransformerLowdimWorkspace

# obs_dim = base_obs_dim + conditioning_dims
# num_reward_dims must match reward model output (K in scores.json)
num_reward_dims: 3
discrete_conditioning: False
n_cond_bins: 21
conditioning_dims: ${eval:'${num_reward_dims} * ${n_cond_bins} if ${discrete_conditioning} else ${num_reward_dims}'}
obs_dim: ${eval:'${task.obs_dim} + ${conditioning_dims}'}
action_dim: ${task.action_dim}
task_name: ${task.name}
exp_name: "default"

# Per-axis z-score targets for eval sweeps (length must match num_reward_dims)
eval_z_positive: null   # e.g. [1.5, 1.5, 1.5] — defaults to [1.5]*K if null
eval_z_negative: null   # e.g. [-1.5, -1.5, -1.5] — defaults to [-1.5]*K if null

horizon: 5
n_obs_steps: 3
n_action_steps: 1
n_latency_steps: 0
past_action_visible: False
keypoint_visible_rate: 1.0
obs_as_cond: True
pred_action_steps_only: False

# Paths to rollout and reward model data (override on command line)
rollout_data_path: ???
scores_path: ???
demo_hdf5_path: ???

policy:
  _target_: diffusion_policy.policy.flow_transformer_lowdim_policy.FlowTransformerLowdimPolicy

  model:
    _target_: diffusion_policy.model.diffusion.transformer_for_diffusion.TransformerForDiffusion
    input_dim: ${eval:'${action_dim} if ${obs_as_cond} else ${obs_dim} + ${action_dim}'}
    output_dim: ${policy.model.input_dim}
    horizon: ${horizon}
    n_obs_steps: ${n_obs_steps}
    cond_dim: ${eval:'${obs_dim} if ${obs_as_cond} else 0'}

    n_layer: 8
    n_head: 4
    n_emb: 256
    p_drop_emb: 0.0
    p_drop_attn: 0.3

    causal_attn: True
    time_as_cond: True
    obs_as_cond: ${obs_as_cond}
    n_cond_layers: 0

  horizon: ${horizon}
  obs_dim: ${obs_dim}
  action_dim: ${action_dim}
  n_action_steps: ${n_action_steps}
  n_obs_steps: ${n_obs_steps}
  num_inference_steps: 10
  obs_as_cond: ${obs_as_cond}
  pred_action_steps_only: ${pred_action_steps_only}
  beta_a: 1.5
  beta_b: 1.0

ema:
  _target_: diffusion_policy.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

dataloader:
  batch_size: 256
  num_workers: 1
  shuffle: True
  pin_memory: True
  persistent_workers: False

val_dataloader:
  batch_size: 256
  num_workers: 1
  shuffle: False
  pin_memory: True
  persistent_workers: False

optimizer:
  learning_rate: 1.0e-4
  weight_decay: 1.0e-3
  betas: [0.9, 0.95]

task:
  env_runner:
    _target_: diffusion_policy.env_runner.reward_conditioned_lowdim_runner.RewardConditionedLowdimRunner
    target_rewards: [0.0, 0.0, 0.0]
    num_reward_dims: ${num_reward_dims}
    discrete_conditioning: ${discrete_conditioning}
    n_cond_bins: ${n_cond_bins}
    use_twopeg_wrapper: False
  dataset:
    _target_: diffusion_policy.dataset.reward_conditioned_lowdim_dataset.RewardConditionedLowdimDataset
    rollout_data_path: ${rollout_data_path}
    scores_path: ${scores_path}
    demo_hdf5_path: ${demo_hdf5_path}
    horizon: ${horizon}
    pad_before: ${eval:'${n_obs_steps}-1+${n_latency_steps}'}
    pad_after: ${eval:'${n_action_steps}-1'}
    obs_keys: ${task.obs_keys}
    num_reward_dims: ${num_reward_dims}
    discrete_conditioning: ${discrete_conditioning}
    n_cond_bins: ${n_cond_bins}
    seed: 42
    val_ratio: 0.02
    max_train_episodes: null

training:
  device: "cuda:0"
  seed: 42
  debug: False
  resume: True
  lr_scheduler: cosine
  lr_warmup_steps: 1000
  num_epochs: 5000
  gradient_accumulate_every: 1
  use_ema: True
  rollout_every: 50
  checkpoint_every: 50
  val_every: 1
  sample_every: 5
  max_train_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0

logging:
  project: reward_conditioned_policy
  resume: True
  mode: online
  name: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}
  tags: ["${name}", "${task_name}", "${exp_name}"]
  id: null
  group: null

checkpoint:
  topk:
    monitor_key: test_mean_score
    mode: max
    k: 5
    format_str: 'epoch={epoch:04d}-test_mean_score={test_mean_score:.3f}.ckpt'
  save_last_ckpt: True
  save_last_snapshot: False

multi_run:
  run_dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  sweep:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
    subdir: ${hydra.job.num}
